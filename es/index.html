<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5860388057073812"
      crossorigin="anonymous"
    ></script>
    <title>Repetidor AB | Bucle A/B para MP3</title>
    <meta
      name="description"
      content="Reproductor MP3 con repetición AB en el navegador: fija puntos A/B, repite un segmento y practica de 0.25x a 4x."
    />
    <link rel="canonical" href="https://abrepeat.com/es/" />
    <link rel="alternate" hreflang="x-default" href="https://abrepeat.com/" />
    <link rel="alternate" hreflang="zh-CN" href="https://abrepeat.com/zh/" />
    <link rel="alternate" hreflang="en" href="https://abrepeat.com/en/" />
    <link rel="alternate" hreflang="es" href="https://abrepeat.com/es/" />
    <link rel="alternate" hreflang="ja" href="https://abrepeat.com/ja/" />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body data-lang="es">
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Práctica local con MP3</p>
          <h1>Repetidor AB</h1>
        </div>
        <div class="header-actions">
          <nav class="language-switcher" aria-label="Idioma">
            <a href="../zh/" lang="zh-CN">中文</a>
            <a href="../en/" lang="en">EN</a>
            <a href="../es/" aria-current="page">ES</a>
            <a href="../ja/" lang="ja">日本語</a>
          </nav>
          <label class="file-button" for="fileInput">Elegir MP3</label>
        </div>
        <input id="fileInput" class="visually-hidden" type="file" accept="audio/mpeg,audio/mp3,.mp3" />
      </header>

      <section id="dropZone" class="drop-zone" aria-label="Zona de archivo MP3">
        <div class="drop-copy">
          <strong id="fileName">Aún no hay audio</strong>
          <span id="statusText">Elige un archivo MP3</span>
        </div>
      </section>

      <audio id="audio" preload="metadata"></audio>

      <section class="player-surface" aria-label="Reproductor de repetición">
        <div class="transport-row">
          <button id="playButton" class="primary-button" type="button" disabled>Reproducir</button>
          <button id="backButton" class="icon-button" type="button" disabled aria-label="Retroceder 5 segundos">-5s</button>
          <button id="forwardButton" class="icon-button" type="button" disabled aria-label="Avanzar 5 segundos">+5s</button>
          <div class="time-readout" aria-live="polite">
            <span id="currentTime">00:00.0</span>
            <span>/</span>
            <span id="durationTime">00:00.0</span>
          </div>
        </div>

        <div
          id="timeline"
          class="timeline"
          style="--progress: 0%; --segment-left: 0%; --segment-width: 0%;"
        >
          <div class="timeline-track"></div>
          <div class="timeline-progress"></div>
          <div class="timeline-segment"></div>
          <input
            id="seekSlider"
            class="seek-slider"
            type="range"
            min="0"
            max="0"
            step="0.01"
            value="0"
            disabled
            aria-label="Posición de reproducción"
          />
        </div>

        <div class="marker-grid">
          <div class="marker-panel">
            <span class="marker-label">Punto A</span>
            <strong id="aTime">Sin fijar</strong>
            <button id="setAButton" type="button" disabled>Fijar A</button>
          </div>
          <div class="marker-panel">
            <span class="marker-label">Punto B</span>
            <strong id="bTime">Sin fijar</strong>
            <button id="setBButton" type="button" disabled>Fijar B</button>
          </div>
          <div class="loop-panel">
            <button id="loopButton" class="loop-button" type="button" disabled aria-pressed="false">Bucle AB apagado</button>
            <button id="clearButton" type="button" disabled>Borrar A/B</button>
          </div>
        </div>

        <section class="speed-panel" aria-label="Velocidad de reproducción">
          <div class="speed-header">
            <span>Velocidad</span>
            <strong id="speedValue">1.00x</strong>
          </div>
          <div class="speed-controls">
            <button id="slowerButton" class="step-button" type="button" disabled>Más lento</button>
            <input
              id="speedSlider"
              type="range"
              min="0.25"
              max="4"
              step="0.05"
              value="1"
              disabled
              aria-label="Velocidad de reproducción"
            />
            <button id="fasterButton" class="step-button" type="button" disabled>Más rápido</button>
          </div>
          <div class="speed-presets" aria-label="Velocidades rápidas">
            <button type="button" data-speed="0.25" disabled>0.25x</button>
            <button type="button" data-speed="0.5" disabled>0.5x</button>
            <button type="button" data-speed="0.75" disabled>0.75x</button>
            <button type="button" data-speed="1" disabled class="is-active">1x</button>
            <button type="button" data-speed="1.25" disabled>1.25x</button>
            <button type="button" data-speed="1.5" disabled>1.5x</button>
            <button type="button" data-speed="2" disabled>2x</button>
            <button type="button" data-speed="3" disabled>3x</button>
            <button type="button" data-speed="4" disabled>4x</button>
          </div>
        </section>
      </section>
    </main>

    <footer class="ad-footer" aria-label="Zona publicitaria">
      <div class="ad-slot">
        <span>Espacio publicitario 1</span>
      </div>
      <div class="ad-slot">
        <span>Espacio publicitario 2</span>
      </div>
    </footer>

    <footer class="site-footer" aria-label="Enlaces del sitio">
      <nav class="footer-links">
        <a href="about/">Acerca de</a>
        <a href="privacy/">Privacidad</a>
        <a href="contact/">Contacto</a>
      </nav>
      <p>Repetidor AB procesa el audio localmente en tu navegador.</p>
    </footer>

    <script src="../app.js"></script>
  </body>
</html>
