<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AB Repeat Player - Choose Language</title>
    <meta
      name="description"
      content="Choose a language for AB Repeat Player, a browser-based MP3 A/B loop practice tool."
    />
    <link rel="canonical" href="https://abrepeat.com/" />
    <link rel="alternate" hreflang="x-default" href="https://abrepeat.com/" />
    <link rel="alternate" hreflang="zh-CN" href="https://abrepeat.com/zh/" />
    <link rel="alternate" hreflang="en" href="https://abrepeat.com/en/" />
    <link rel="alternate" hreflang="es" href="https://abrepeat.com/es/" />
    <link rel="alternate" hreflang="ja" href="https://abrepeat.com/ja/" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="language-page">
      <header class="language-hero">
        <p class="eyebrow">MP3 A/B Loop Practice</p>
        <h1>AB Repeat Player</h1>
        <p>Choose your language to start practicing with a local MP3 file.</p>
      </header>

      <section class="language-grid" aria-label="Language options">
        <a class="language-card" href="zh/" hreflang="zh-CN" lang="zh-CN">
          <span>中文</span>
          <strong>AB 复读机</strong>
        </a>
        <a class="language-card" href="en/" hreflang="en" lang="en">
          <span>English</span>
          <strong>AB Repeat Player</strong>
        </a>
        <a class="language-card" href="es/" hreflang="es" lang="es">
          <span>Español</span>
          <strong>Repetidor AB</strong>
        </a>
        <a class="language-card" href="ja/" hreflang="ja" lang="ja">
          <span>日本語</span>
          <strong>ABリピートプレーヤー</strong>
        </a>
      </section>
    </main>

    <footer class="ad-footer" aria-label="Advertising area">
      <div class="ad-slot">
        <span>Ad slot 1</span>
      </div>
      <div class="ad-slot">
        <span>Ad slot 2</span>
      </div>
    </footer>

    <footer class="site-footer" aria-label="Site links">
      <nav class="footer-links">
        <a href="en/about/">About</a>
        <a href="en/privacy/">Privacy</a>
        <a href="en/contact/">Contact</a>
      </nav>
      <p>AB Repeat Player processes audio locally in your browser.</p>
    </footer>
  </body>
</html>
