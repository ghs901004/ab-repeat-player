        <h1>AB 复读机</h1>
        <p>
          AB 复读机是一个在浏览器里运行的本地 MP3 练习工具，适合语言学习、听力训练、音乐练习和音频转写。
        </p>
        <h2>它能做什么</h2>
        <p>
          你可以选择设备里的 MP3 文件，设置 A 点和 B 点，循环播放这一段，并把播放速度调到 0.25x 到 4x。
        </p>
        <h2>本地优先</h2>
        <p>
          音频文件在你的浏览器本地处理，不会上传到 AB 复读机的服务器，也不会被本站保存。
        </p>
        <p><a class="text-link" href="../">打开播放器</a></p>
