<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AB Repeat Player | MP3 A/B Loop Tool</title>
    <meta
      name="description"
      content="A browser-based MP3 AB repeat player for setting A/B points, looping a segment, and practicing at 0.25x to 4x speed."
    />
    <link rel="canonical" href="https://abrepeat.com/en/" />
    <link rel="alternate" hreflang="x-default" href="https://abrepeat.com/" />
    <link rel="alternate" hreflang="zh-CN" href="https://abrepeat.com/zh/" />
    <link rel="alternate" hreflang="en" href="https://abrepeat.com/en/" />
    <link rel="alternate" hreflang="es" href="https://abrepeat.com/es/" />
    <link rel="alternate" hreflang="ja" href="https://abrepeat.com/ja/" />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body data-lang="en">
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Local MP3 Practice</p>
          <h1>AB Repeat Player</h1>
        </div>
        <div class="header-actions">
          <nav class="language-switcher" aria-label="Language">
            <a href="../zh/" lang="zh-CN">中文</a>
            <a href="../en/" aria-current="page">EN</a>
            <a href="../es/" lang="es">ES</a>
            <a href="../ja/" lang="ja">日本語</a>
          </nav>
          <label class="file-button" for="fileInput">Choose MP3</label>
        </div>
        <input id="fileInput" class="visually-hidden" type="file" accept="audio/mpeg,audio/mp3,.mp3" />
      </header>

      <section id="dropZone" class="drop-zone" aria-label="MP3 file area">
        <div class="drop-copy">
          <strong id="fileName">No audio loaded yet</strong>
          <span id="statusText">Choose an MP3 file</span>
        </div>
      </section>

      <audio id="audio" preload="metadata"></audio>

      <section class="player-surface" aria-label="Repeat player">
        <div class="transport-row">
          <button id="playButton" class="primary-button" type="button" disabled>Play</button>
          <button id="backButton" class="icon-button" type="button" disabled aria-label="Back 5 seconds">-5s</button>
          <button id="forwardButton" class="icon-button" type="button" disabled aria-label="Forward 5 seconds">+5s</button>
          <div class="time-readout" aria-live="polite">
            <span id="currentTime">00:00.0</span>
            <span>/</span>
            <span id="durationTime">00:00.0</span>
          </div>
        </div>

        <div
          id="timeline"
          class="timeline"
          style="--progress: 0%; --segment-left: 0%; --segment-width: 0%;"
        >
          <div class="timeline-track"></div>
          <div class="timeline-progress"></div>
          <div class="timeline-segment"></div>
          <input
            id="seekSlider"
            class="seek-slider"
            type="range"
            min="0"
            max="0"
            step="0.01"
            value="0"
            disabled
            aria-label="Playback position"
          />
        </div>

        <div class="marker-grid">
          <div class="marker-panel">
            <span class="marker-label">Point A</span>
            <strong id="aTime">Not set</strong>
            <button id="setAButton" type="button" disabled>Set A</button>
          </div>
          <div class="marker-panel">
            <span class="marker-label">Point B</span>
            <strong id="bTime">Not set</strong>
            <button id="setBButton" type="button" disabled>Set B</button>
          </div>
          <div class="loop-panel">
            <button id="loopButton" class="loop-button" type="button" disabled aria-pressed="false">AB Loop Off</button>
            <button id="clearButton" type="button" disabled>Clear A/B</button>
          </div>
        </div>

        <section class="speed-panel" aria-label="Playback speed">
          <div class="speed-header">
            <span>Speed</span>
            <strong id="speedValue">1.00x</strong>
          </div>
          <div class="speed-controls">
            <button id="slowerButton" class="step-button" type="button" disabled>Slower</button>
            <input
              id="speedSlider"
              type="range"
              min="0.25"
              max="4"
              step="0.05"
              value="1"
              disabled
              aria-label="Playback speed"
            />
            <button id="fasterButton" class="step-button" type="button" disabled>Faster</button>
          </div>
          <div class="speed-presets" aria-label="Speed presets">
            <button type="button" data-speed="0.25" disabled>0.25x</button>
            <button type="button" data-speed="0.5" disabled>0.5x</button>
            <button type="button" data-speed="0.75" disabled>0.75x</button>
            <button type="button" data-speed="1" disabled class="is-active">1x</button>
            <button type="button" data-speed="1.25" disabled>1.25x</button>
            <button type="button" data-speed="1.5" disabled>1.5x</button>
            <button type="button" data-speed="2" disabled>2x</button>
            <button type="button" data-speed="3" disabled>3x</button>
            <button type="button" data-speed="4" disabled>4x</button>
          </div>
        </section>
      </section>
    </main>

    <footer class="ad-footer" aria-label="Advertising area">
      <div class="ad-slot">
        <span>Ad slot 1</span>
      </div>
      <div class="ad-slot">
        <span>Ad slot 2</span>
      </div>
    </footer>

    <footer class="site-footer" aria-label="Site links">
      <nav class="footer-links">
        <a href="about/">About</a>
        <a href="privacy/">Privacy</a>
        <a href="contact/">Contact</a>
      </nav>
      <p>AB Repeat Player processes audio locally in your browser.</p>
    </footer>

    <script src="../app.js"></script>
  </body>
</html>
